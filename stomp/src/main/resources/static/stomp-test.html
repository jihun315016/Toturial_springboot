<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STOMP 테스트 클라이언트</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #status { font-weight: bold; }
        .connected { color: green; }
        .disconnected { color: red; }
        #messages { list-style: none; padding: 0; }
        #messages li { margin-bottom: 5px; padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<h2>STOMP WebSocket 테스트 클라이언트</h2>

<div id="login-area">
    <h3>로그인 및 토큰 확보</h3>
    <p>테스트용 토큰을 발급받습니다. (POST /user/login)</p>
    <button onclick="loginAndGetToken()">테스트 로그인</button>
    <p>현재 토큰: <span id="jwt-token" style="color: blue;">로그인 전</span></p>
</div>

<hr/>

<div id="status-area">
    <p>연결 상태: <span id="status" class="disconnected">연결 끊김</span></p>
    <label for="room-id">테스트 Room ID:</label>
    <input type="text" id="room-id" value="100" placeholder="예: 100">
    <button onclick="connect()">연결 및 구독</button>
    <button onclick="disconnect()">연결 끊기</button>
</div>

<hr/>

<div id="message-area">
    <h3>메시지 전송</h3>
    <label for="message-input">메시지:</label>
    <input type="text" id="message-input" placeholder="전송할 메시지">
    <button onclick="sendMessage()" disabled id="send-btn">전송</button>
</div>

<hr/>

<div id="log-area">
    <h3>수신 메시지 로그</h3>
    <ul id="messages"></ul>
</div>

<script>
    // ⭐️ 변수 선언을 정리하고 중복을 제거했습니다.
    let stompClient = null;
    let currentToken = null;

    const ENDPOINT = 'http://localhost:8081/connect';
    const SUBSCRIBE_PREFIX = '/topic/';
    const PUBLISH_PREFIX = '/publish/';

    /**
     * /user/login 엔드포인트에 요청하여 JWT 토큰을 받아 currentToken에 저장합니다.
     */
    function loginAndGetToken() {
        $.post("/user/login", function(data) {
            if (data.token) {
                currentToken = data.token;
                // 토큰이 길기 때문에 일부만 표시
                $("#jwt-token").text(currentToken.substring(0, 30) + "...");
                alert("로그인 성공! 토큰이 확보되었습니다.");
            } else {
                alert("로그인에 성공했지만 토큰을 받지 못했습니다.");
            }
        }).fail(function(jqXHR, textStatus, errorThrown) {
            console.error("로그인 실패:", jqXHR.responseText || errorThrown);
            alert("로그인 실패! 백엔드 서버 로그를 확인하세요.");
        });
    }

    /**
     * 연결 상태 UI를 업데이트합니다.
     */
    function setConnected(connected) {
        $("#status").text(connected ? "연결됨" : "연결 끊김")
            .toggleClass("connected", connected)
            .toggleClass("disconnected", !connected);
        $("#send-btn").prop("disabled", !connected);
    }

    /**
     * STOMP WebSocket 연결을 시도하고 구독합니다.
     */
    function connect() {
        if (stompClient && stompClient.connected) {
            alert("이미 연결되어 있습니다.");
            return;
        }

        // ⭐️ 토큰 인증이 필요
        if (!currentToken) {
            alert("먼저 '테스트 로그인' 버튼을 클릭하여 토큰을 확보하세요.");
            return;
        }

        const roomId = $("#room-id").val();
        if (!roomId) {
            alert("Room ID를 입력해주세요.");
            return;
        }

        // 1. SockJS를 사용하여 WebSocket 연결 생성
        let socket = new SockJS(ENDPOINT);
        stompClient = Stomp.over(socket);

        // 2. STOMP 연결 헤더에 JWT 토큰 추가 (Bearer 형식)
        const headers = {
            'Authorization': 'Bearer ' + currentToken
        };

        // 3. STOMP 연결 시도
        stompClient.connect(headers, function (frame) {
            console.log('Connected: ' + frame);
            setConnected(true);

            // 4. 메시지를 수신할 경로 구독 (/topic/{roomId})
            const subscriptionPath = SUBSCRIBE_PREFIX + roomId;
            console.log('Subscribing to: ' + subscriptionPath);

            stompClient.subscribe(subscriptionPath, function (messageOutput) {
                showMessage(messageOutput.body, roomId);
            }, headers); // 구독 시에도 헤더를 전달해야 할 수 있습니다.

        }, function(error) {
            console.error("STOMP 연결 실패:", error);
            setConnected(false);
            alert("STOMP 연결에 실패했습니다. (토큰 문제, 401 오류 가능성)");
        });
    }

    /**
     * 연결을 끊습니다.
     */
    function disconnect() {
        if (stompClient !== null) {
            stompClient.disconnect();
            console.log("Disconnected");
        }
        setConnected(false);
    }

    /**
     * 메시지를 /publish/{roomId} 경로로 전송합니다.
     */
    function sendMessage() {
        if (!stompClient || !stompClient.connected) {
            alert("먼저 연결하세요.");
            return;
        }

        const roomId = $("#room-id").val();
        const messageText = $("#message-input").val();

        if (!messageText || !roomId) {
            alert("메시지와 Room ID를 모두 입력해주세요.");
            return;
        }

        const publishPath = PUBLISH_PREFIX + roomId;
        console.log('Sending to: ' + publishPath + ' with message: ' + messageText);

        // 백엔드 Controller의 String message 인자에는 문자열이 그대로 전달됩니다.
        stompClient.send(publishPath, {}, messageText); // String을 보낼 때는 JSON.stringify 제거

        $("#message-input").val("");
    }

    /**
     * 수신 메시지를 로그 영역에 추가합니다.
     */
    function showMessage(message, roomId) {
        $("#messages").append("<li><strong>Room [" + roomId + "] 수신:</strong> " + message + "</li>");
    }

    // 페이지 로드 시 초기 상태 설정
    $(document).ready(function() {
        setConnected(false);
    });

</script>
</body>
</html>
